name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e .[dev]

      - name: Run tests with coverage
        run: python -m coverage run -m unittest discover -s tests -v

      - name: Build release distributions and coverage assets
        run: |
          python -m coverage xml -o coverage.xml
          python -m coverage html -d htmlcov
          python -m coverage report -m > coverage-summary.txt
          python -m build --sdist --wheel
          zip -r htmlcov.zip htmlcov

      - name: Generate changelog asset
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "${TAG_NAME}^" 2>/dev/null || true)
          {
            echo "# Changelog for ${TAG_NAME}"
            echo
            if [ -n "$PREVIOUS_TAG" ]; then
              echo "Changes since ${PREVIOUS_TAG}:"
              echo
              git log --pretty=format:'- %s (%h)' "${PREVIOUS_TAG}..${TAG_NAME}"
            else
              echo "Initial release changes:"
              echo
              git log --pretty=format:'- %s (%h)'
            fi
            echo
          } > release-changelog.md

      - name: Upload release build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            dist/*
            coverage.xml
            coverage-summary.txt
            htmlcov.zip
            release-changelog.md

  create-release:
    runs-on: ubuntu-latest
    needs: build-release

    steps:
      - name: Download release build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Create GitHub release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body_path: release-assets/release-changelog.md

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" --repo "${{ github.repository }}" \
            release-assets/dist/* \
            release-assets/coverage.xml \
            release-assets/coverage-summary.txt \
            release-assets/htmlcov.zip \
            release-assets/release-changelog.md

  publish-pypi:
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/p/quickli

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: release-assets/dist/
